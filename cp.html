]},

{id:'files',title:'Computer Files',emoji:'📁',cat:'MODULE 04',
terms:[
  {name:'Computer File',body:`<p>a <strong>computer file</strong> is just data chilling on a nonvolatile device (hard disk, USB, CD, etc.). <strong>nonvolatile</strong> = it keeps the data even when u turn it off, unlike RAM which forgets everything like it never knew u. that's the whole definition.</p><p>every file has three things in common: <strong>size</strong> (how much disk space it eats), <strong>name</strong>, and <strong>creation time</strong>.</p>`,
   q:{type:'id',q:'What is a collection of data stored on a nonvolatile storage device called?',answer:'computer file',accept:['computer file','file'],exp:'A computer file is a collection of data stored on a nonvolatile device. Nonvolatile means data persists when powered off — unlike RAM.'}},
  {name:'Text Files vs Binary Files',body:`<p>two types of files based on how they store data:</p><table><tr><th>📄 TEXT FILES</th><th>⬛ BINARY FILES</th></tr><tr><td>encoded in ASCII or Unicode — readable in Notepad etc. examples: .txt, .csv, .java — data files and source code</td><td>raw 0s and 1s — looks like gibberish in Notepad. examples: .class, .mp3, .png — compiled bytecode, media files</td></tr></table>`,
   q:{type:'mc',q:'A compiled .class file is which type of file?',choices:['A. Text file encoded in ASCII','B. Source file','C. Binary file','D. Directory'],answer:'C',exp:'Binary files contain raw binary data (0s and 1s). A compiled .class file is binary — not readable in a text editor.'}},
  {name:'Root Directory, Folder, and Path',body:`<p><strong>root directory</strong> — the top-level folder of ur storage. everything lives inside it.</p><p><strong>folder / directory</strong> — u can nest folders inside folders like a hierarchy. very organized era. folders inside folders inside folders.</p><p><strong>path</strong> — the full address to find a file. like ur home address but for data. it's the complete list of disk drive + directory hierarchy.</p>${codeHtml('C:\\\\Java\\\\Chapter.11\\\\Data.txt   // Windows path (uses backslash \\\\)\n/home/user/Java/Data.txt       // UNIX/Solaris path (uses forward slash /)')}`,
   q:{type:'id',q:'What is the complete list of disk drive and directory hierarchy where a file resides called?',answer:'path',accept:['path','file path','filepath'],exp:'A path is the complete list of the disk drive and hierarchy of directories where a file resides.'}},
  {name:'Path Separators & Java Escaping',body:`<p>different OS, different separators — don't mix these up:</p><ul><li><strong>Windows</strong>: backslash <code>\\</code></li><li><strong>UNIX/Solaris</strong>: forward slash <code>/</code></li></ul><p>⚠️ in Java Strings, backslash is an <em>escape character</em> so u have to double it. write <code>\\\\</code> to get one actual <code>\\</code> in the path. yes it looks unhinged. no u cannot skip it.</p>${codeHtml('"C:\\\\\\\\Java\\\\\\\\Data.txt"  // represents C:\\\\Java\\\\Data.txt')}`,
   q:{type:'mc',q:'Why must a backslash be written as \\\\\\\\ in a Java String?',choices:['A. Java uses forward slashes internally','B. Backslash is an escape character — doubling it gives one literal backslash','C. Required only by the Path API','D. Only applies to UNIX systems'],answer:'B',exp:'In Java, backslash is an escape character. To get one \\ in a String, write \\\\\\\\.'}},
  {name:'Absolute vs Relative Path',body:`<p><strong>absolute path</strong> — the FULL address. doesn't need context. knows exactly where it is. king behavior.</p>${codeHtml('C:\\\\Java\\\\Chapter.11\\\\SampleFile.txt  // absolute, king')}<p><strong>relative path</strong> — depends on the current working directory. if u only give a filename, Java assumes it's in the same folder as the program. glow-up to absolute with <code>toAbsolutePath()</code> — the glow-up method.</p>${codeHtml('SampleFile.txt              // relative — assumes same folder as program\nPath full = p.toAbsolutePath(); // now it knows its whole address')}`,
   q:{type:'mc',q:'A path containing ONLY a filename (e.g., "Data.txt") is:',choices:['A. An absolute path','B. A root path','C. A full path','D. A relative path'],answer:'D',exp:'A relative path depends on the current directory. A filename alone is relative — Java assumes it is in the same folder as the program.'}},
],
quiz:[
  {type:'mc',q:'Text files differ from binary files in that text files are:',choices:['A. Stored in 0s and 1s','B. Encoded (ASCII/Unicode) and readable in a text editor','C. Compiled program files','D. Always larger in size'],answer:'B'},
  {type:'mc',q:'In UNIX/Solaris, the path delimiter is:',choices:['A. \\\\\\\\','B. :','C. |','D. /'],answer:'D'},
  {type:'mc',q:'The top-level directory of a storage device is called the:',choices:['A. Path','B. Root directory','C. File system','D. Binary tree'],answer:'B'},
  {type:'mc',q:'A complete path that needs no additional context to locate a file is:',choices:['A. Relative path','B. Root path','C. Absolute path','D. Directory path'],answer:'C'},

]},

{id:'pathfiles',title:'Path & Files Classes',emoji:'🗂️',cat:'MODULE 04',
terms:[
  {name:'Path vs Files Classes',body:`<p>both from <code>import java.nio.file.*;</code> — <strong>nio = New Input/Output</strong> (not ur old boring java.io).</p><table><tr><th>Path class</th><th>Files class</th></tr><tr><td>creates objects with <strong>INFO</strong> about files: location, size, creation date, exists? — it's the <strong>ID card</strong> for the file</td><td><strong>DOES OPERATIONS</strong> on files: delete, check attributes, create streams — it's the <strong>action hero</strong></td></tr></table>`,
   q:{type:'mc',q:'Which class performs OPERATIONS on files and directories (deletion, streams)?',choices:['A. Path','B. Paths','C. FileSystems','D. Files'],answer:'D',exp:'The Files class performs operations on files and directories — deletion, attribute checking, and creating I/O streams.'}},
  {name:'Creating a Path — FileSystem & FileSystems',body:`<p>one method uses a <code>FileSystem</code> object — the long way, more steps:</p>${codeHtml('FileSystem fs = FileSystems.getDefault(); // factory method moment\nPath filePath = fs.getPath("C:\\\\\\\\Java\\\\\\\\Data.txt");')}<p>two different classes to know — the <strong>s</strong> matters:</p><ul><li><strong>FileSystem</strong> (no s) — used to instantiate the object</li><li><strong>FileSystems</strong> (with s) — contains <strong>factory methods</strong>. a <strong>factory</strong> is an object that creates other objects. FileSystems is a factory. very sigma.</li></ul>`,
   q:{type:'mc',q:'In OOP, what is an object that creates other objects called?',choices:['A. Singleton','B. Factory','C. Builder','D. Constructor'],answer:'B',exp:"A factory is an object that creates other objects. FileSystems (with 's') is a factory — its getDefault() method creates a FileSystem object."}},
  {name:'Paths Helper Class',body:`<p><strong>Paths.get() is the goat.</strong> the <strong>Paths</strong> class (with s) is a helper class that eliminates the need to create a FileSystem object first. just call <code>get()</code> and ur done — way cleaner, way less steps:</p>${codeHtml('// WAY 2: the easy way — Paths.get() is the goat\nPath filePath = Paths.get("C:\\\\\\\\Java\\\\\\\\Chapter.11\\\\\\\\Data.txt");\n// Note: \\\\\\\\ in Java strings = ONE backslash in the actual path')}<p>after the Path is created, use <code>filePath</code> as the identifier to refer to and operate on the file. the OS sees the full path, ur code sees <code>filePath</code>.</p>`,
   q:{type:'fib',q:'Create a Path using the Paths helper class:',code:'Path filePath = ___1___.___2___("C:\\\\\\\\Java\\\\\\\\Data.txt");',blanks:[{id:1,answer:'Paths',accept:['paths','Paths']},{id:2,answer:'get',accept:['get']}],exp:"Paths.get() is the recommended approach. Paths (with 's') is the helper class that skips needing a FileSystem object."}},
  {name:'Path Methods',body:`<p>key methods on a Path object — know ALL of these:</p>${codeHtml('Path p = Paths.get("C:\\\\\\\\Java\\\\\\\\Chapter.11\\\\\\\\Data.txt");\np.toString()       // "C:\\\\Java\\\\Chapter.11\\\\Data.txt" — full path as String\np.getFileName()    // Data.txt — the last element (the actual filename)\np.getNameCount()   // 3 — how many elements in the path\np.getName(0)       // Java — index 0 = top-level (NOT C:\\\\ — root doesn\'t count)\np.getName(1)       // Chapter.11\np.getName(2)       // Data.txt — same as getFileName()\np.toAbsolutePath() // glow-up method: converts relative → absolute')}<p>⚠️ the root (C:\\\\) is NOT counted as a name element — index 0 starts after it. getName(0) in this path returns <strong>Java</strong>, not C:\\\\. don't mix this up, it's a classic exam trap.</p>`,
   q:{type:'mc',q:'For "C:\\\\\\\\Java\\\\\\\\Chapter.11\\\\\\\\Data.txt", what does getName(0) return?',choices:['A. C:\\\\\\\\','B. Data.txt','C. Chapter.11','D. Java'],answer:'D',exp:'getName(0) returns the first element after the root drive. Index 0 = Java, 1 = Chapter.11, 2 = Data.txt.'}},
  {name:'checkAccess() & Files.exists()',body:`<p>need this import first: <code>import static java.nio.file.AccessMode.*;</code></p><table><tr><th>argument</th><th>what it checks</th></tr><tr><td>(none)</td><td>file exists — that's it</td></tr><tr><td>READ</td><td>file exists + program can read it</td></tr><tr><td>WRITE</td><td>file exists + program can write to it</td></tr><tr><td>EXECUTE</td><td>file exists + program can run it</td></tr><tr><td>READ, EXECUTE</td><td>multiple args = checks ALL of them</td></tr></table><p>⚠️ throws <code>IOException</code> if access denied — wrap in try-catch or ur program will crash out.</p>${codeHtml('// check READ and EXECUTE permission\nfilePath.getFileSystem().provider().checkAccess(filePath, READ, EXECUTE);\n\n// alternative: just check if file exists (cleaner)\nboolean exists = Files.exists(filePath);')}`,
   q:{type:'mc',q:'Which import is needed to use AccessMode constants (READ, WRITE, EXECUTE) directly?',choices:['A. import java.nio.file.AccessMode.*;','B. import static java.nio.file.AccessMode.*;','C. import java.io.AccessMode.*;','D. import java.nio.AccessMode.*;'],answer:'B',exp:'The STATIC import lets you use READ, WRITE, EXECUTE without qualifying them as AccessMode.READ etc.'}},
  {name:'BasicFileAttributes & FileTime',body:`<p>reading file attributes — <strong>the metadata arc</strong>. need these imports:</p>${codeHtml('import java.nio.file.attribute.*;\n\nBasicFileAttributes attr =\n    Files.readAttributes(filePath, BasicFileAttributes.class);\n\nattr.creationTime()      // FileTime: when it was born — yyyy-mm-ddThh:mm:ss format\nattr.lastModifiedTime()  // FileTime: when it was last edited\nattr.size()              // long: size in bytes')}<p>FileTime format: <code>yyyy-mm-ddThh:mm:ss</code> — e.g. <code>2024-04-27T17:40:44.332044Z</code>. the T separates the date from the time. memorize that format.</p>`,
   q:{type:'mc',q:'What does BasicFileAttributes.size() return?',choices:['A. File name length','B. Number of lines','C. File size in bytes','D. Number of attributes'],answer:'C',exp:'The size() method returns the file size in bytes as a long.'}},
],
quiz:[
  {type:'mc',q:'The "nio" in java.nio stands for:',choices:['A. Native Input Operations','B. New Input/Output','C. Network Input/Output','D. Nested IO'],answer:'B'},
  {type:'mc',q:'Which Path method returns the total number of name elements?',choices:['A. getFileName()','B. length()','C. getNameCount()','D. size()'],answer:'C'},

{id:'io',title:'The IO Classes',emoji:'🌊',cat:'MODULE 04',
terms:[
  {name:'IO Hierarchy Overview',body:`<p>java has a whole hierarchy of IO classes for reading and writing. they're all from the <code>Object</code> class. think of them as different <strong>pipelines for moving data</strong>.</p>${codeHtml('Object\n+-- InputStream                 // abstract: reads bytes IN\n|     +-- FileInputStream       // reads bytes FROM a disk file\n|     +-- FilterInputStream\n|           +-- BufferedInputStream\n+-- OutputStream                // abstract: writes bytes OUT\n|     +-- FileOutputStream      // writes bytes TO a disk file\n|     +-- FilterOutputStream\n|           +-- BufferedOutputStream\n|           +-- PrintStream    // System.out is literally this!\n+-- Reader                      // abstract: reads CHARACTERS (text)\n      +-- BufferedReader        // buffered char reading — efficient\n      +-- BufferedWriter        // buffered char writing — efficient')}`,
   q:{type:'mc',q:'In the IO hierarchy, InputStream is a direct subclass of:',choices:['A. Reader','B. Object','C. OutputStream','D. FilterInputStream'],answer:'B',exp:'InputStream, OutputStream, and Reader are all direct subclasses of Object — they sit at the top of the IO hierarchy.'}},
  {name:'InputStream & FileInputStream',body:`<p><strong>InputStream</strong> — abstract. base class for byte input. reads bytes IN from somewhere. can't instantiate it directly, it's just the blueprint.</p><p><strong>FileInputStream</strong> — child of InputStream. reads bytes FROM a disk file specifically. this is the one u actually use when reading file data.</p><p><strong>BufferedInputStream</strong> — child of FilterInputStream. buffers keyboard/standard input so it's not reading one byte at a time like a lost NPC.</p>`,
   q:{type:'mc',q:'Which class provides the capability to READ BYTES FROM a disk file?',choices:['A. FileOutputStream','B. BufferedReader','C. FileInputStream','D. PrintStream'],answer:'C',exp:'FileInputStream is a child of InputStream that specifically reads bytes from disk files.'}},
  {name:'OutputStream, FileOutputStream & PrintStream',body:`<p><strong>OutputStream</strong> — abstract. base class for byte output. writes bytes OUT somewhere. the blueprint, not the actual tool.</p><p><strong>FileOutputStream</strong> — child of OutputStream. writes bytes TO a disk file. this is the one u use when writing file data.</p><p><strong>BufferedOutputStream</strong> — child of FilterOutputStream. buffers standard output (monitor) so it's not writing one byte at a time.</p><p><strong>PrintStream</strong> — child of FilterOutputStream. <code>System.out</code> is <strong>literally a PrintStream</strong>. every time u've ever done <code>System.out.println()</code>, u were using a PrintStream and didn't even know it.</p>`,
   q:{type:'mc',q:"Java's System.out is an instance of which class?",choices:['A. BufferedWriter','B. FileOutputStream','C. OutputStream','D. PrintStream'],answer:'D',exp:"System.out is a PrintStream object — PrintStream is a child of FilterOutputStream."}},
  {name:'Reader, BufferedReader & BufferedWriter',body:`<p><strong>Reader</strong> — abstract. base class for reading CHARACTER streams (text, not raw bytes). the difference from InputStream is that this one works with characters, not raw binary.</p><p><strong>BufferedReader</strong> — reads text from a char stream with buffering. fast and efficient. doesn't read one character at a time like a bronze-tier program — it buffers entire lines.</p><p><strong>BufferedWriter</strong> — writes text to a char stream with buffering. also fast and efficient. the output version of BufferedReader.</p>`,
   q:{type:'mc',q:'Which class reads text from a character-input stream with buffering?',choices:['A. BufferedOutputStream','B. FileInputStream','C. BufferedReader','D. PrintStream'],answer:'C',exp:'BufferedReader reads text from a character-input stream with buffering for efficient reading.'}},
  {name:'OutputStream Methods',body:`<p>four methods — know ALL of them:</p>${codeHtml('void close()                           // closes the stream. free the resources bestie.\nvoid flush()                           // force-writes buffered bytes. don\'t leave data stuck.\nvoid write(byte[] b)                   // writes the whole byte array to output.\nvoid write(byte[] b, int off, int len) // writes len bytes starting at index off.')}`,
   q:{type:'mc',q:'Which OutputStream method FORCES buffered bytes to be written to the output device?',choices:['A. close()','B. flush()','C. write()','D. push()'],answer:'B',exp:'flush() forces buffered bytes to be written. close() releases resources. write() sends bytes to the stream.'}},
  {name:'getBytes() and the ScreenOut Pattern',body:`<p><code>getBytes()</code> converts a String into a <code>byte[]</code> array — <strong>crucial step</strong> before writing to an OutputStream. u can't just write a String directly.</p><p>the <strong>ScreenOut pattern</strong> — putting it all together:</p>${codeHtml('String s = "ABCDF";\nbyte[] data = s.getBytes();    // String → byte array. crucial step.\nOutputStream output = System.out;\ntry {\n    output.write(data);        // write the bytes\n    output.flush();            // push any remaining buffered bytes\n    output.close();            // clean up\n}\ncatch(Exception e) {\n    System.out.println("Message: " + e);\n}\n// output: ABCDF')}`,
   q:{type:'fib',q:'Fill in the four method calls:',code:'String s = "HELLO";\nbyte[] data = s.___1___();\nOutputStream out = System.out;\nout.___2___(data);\nout.___3___();\nout.___4___();',blanks:[{id:1,answer:'getBytes',accept:['getbytes','getBytes']},{id:2,answer:'write',accept:['write']},{id:3,answer:'flush',accept:['flush']},{id:4,answer:'close',accept:['close']}],exp:'getBytes() converts String to byte[], write() sends bytes, flush() pushes buffer, close() releases resources.'}},
],
quiz:[
  {type:'mc',q:'PrintStream is a child of which class?',choices:['A. OutputStream','B. FilterInputStream','C. FilterOutputStream','D. BufferedOutputStream'],answer:'C'},
  {type:'mc',q:'Which OutputStream method closes the stream and releases system resources?',choices:['A. flush()','B. write()','C. close()','D. dispose()'],answer:'C'},
  {type:'mc',q:'You want to WRITE CHARACTERS to a file with buffering. Which class?',choices:['A. BufferedReader','B. PrintStream','C. FileOutputStream','D. BufferedWriter'],answer:'D'},
  {type:'mc',q:'write(byte[] b, int off, int len) writes:',choices:['A. All bytes in array','B. Only the first byte','C. len bytes from b starting at index off','D. off bytes up to index len'],answer:'C'},
  {type:'mc',q:'Which class is shared parent of BOTH BufferedOutputStream AND PrintStream?',choices:['A. OutputStream','B. FilterOutputStream','C. FileOutputStream','D. BufferedOutputStream'],answer:'B'},
]},
];

let mqQs=[],mqIdx=0,mqCorrect=0,mqAnswered=false;

const app=document.getElementById('app');
function R(html){app.innerHTML=html;app.classList.add('z-slide');requestAnimationFrame(()=>app.classList.remove('z-slide'))}

function pct(v,m){return m?Math.round(v/m*100):0}
function progressBar(v,m,color='progress-bar'){
  return`<div class="progress progress-sm" style="border-radius:0;border:2px solid rgba(255,255,255,0.2);background:#1a1a1a">
    <div class="${color} progress-bar-striped" style="width:${pct(v,m)}%;transition:width .4s ease"></div>
  </div>`;
}

// ── HOME ─────────────────────────────────────────────────────────────────────
function renderHome(){
  const mastery=overallMastery();
  const done=SECTIONS.filter(s=>sp(s.id).status==='completed').length;
  const allDone=done===SECTIONS.length;
  const masteryPct=mastery!==null?mastery:0;
  R(`
    <div class="page-banner" style="margin-bottom:0">
      <div class="hazard-strip"></div>
      <div style="position:relative;padding:0 8px">
        <span class="label" style="color:rgba(0,0,0,0.5);margin-bottom:4px">// COPROG BUT MAKE IT RIZZ — no cap, full slay edition 🔥</span>
        <h1 style="font-family:var(--font-display);font-size:clamp(2.4rem,8vw,5rem);font-weight:900;font-style:italic;line-height:0.85;text-transform:uppercase;letter-spacing:-3px;color:var(--color-black);margin-bottom:12px">STUDY<br>MODULE</h1>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          <span style="background:var(--color-black);color:var(--color-primary);font-family:var(--font-mono);font-size:0.7rem;padding:3px 10px;font-weight:700">${done}/${SECTIONS.length} SECTIONS DONE</span>
          ${mastery!==null?`<span style="background:var(--color-black);color:var(--color-secondary);font-family:var(--font-mono);font-size:0.7rem;padding:3px 10px;font-weight:700">⚡ ${mastery}% MASTERY</span>`:''}
        </div>
      </div>
    </div>
    <div style="background:var(--color-black);padding:4px 24px 0">
      ${progressBar(done,SECTIONS.length)}
    </div>

    <div style="padding:24px 16px 80px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span class="label">// Select Section</span>
        ${prog._mastery!==undefined?`<span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--color-text-muted)">LAST MASTERY: <span style="color:var(--color-primary)">${prog._mastery}%</span></span>`:''}
      </div>
      <div class="section-grid">
        ${SECTIONS.map((s,i)=>{
          const p=sp(s.id);
          const isDone=p.status==='completed';
          const isActive=p.status==='in-progress';
          const sc=p.quizScore;
          return`<div class="card ${isDone?'sec-card-done':isActive?'sec-card-active':''}" style="cursor:crosshair" onclick="startSection(${i})">
            <div class="card-header" style="${isDone?'background:var(--color-success);color:#0a0a0a':isActive?'background:var(--color-primary);color:#0a0a0a':''}">
              <span style="font-size:1.5rem">${s.emoji}</span>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
                <span class="badge ${isDone?'badge-black':'badge-muted'}" style="font-size:0.6rem">${s.cat}</span>
                ${sc?`<span style="font-family:var(--font-mono);font-size:0.65rem;font-weight:700">${sc.correct}/${sc.total} QUIZ</span>`:''}
              </div>
            </div>
            <div class="card-body" style="padding:14px 16px">
              <div class="card-name" style="font-size:1.3rem;line-height:1">${s.title}</div>
              <span class="card-func">${isDone?'✅ Completed':isActive?'🔵 In Progress':'⬜ Not started'}</span>
              <div style="margin-top:8px">${progressBar(s.terms.filter((_,ti)=>isDone||isActive&&ti<termIdx).length,s.terms.length,'progress-bar-secondary')}</div>
            </div>
            <div class="card-footer">
              <span class="serial-no">${s.terms.length} TERMS · ${s.quiz.length}Q QUIZ</span>
              <span class="card-link" style="font-size:0.75rem;padding:4px 12px">${isDone?'RETRY':'START'} →</span>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="text-align:center;margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:12px">
        <button class="btn ${allDone?'btn-primary btn-xl':'btn-ghost'}" ${!allDone?'disabled':''} onclick="startMastery()" style="${!allDone?'opacity:.4':''}">
          🏆 ${allDone?'MASTERY QUIZ':'COMPLETE ALL SECTIONS FIRST'}
        </button>
        ${!allDone?`<span class="text-muted" style="font-size:0.75rem;font-family:var(--font-mono)">${SECTIONS.length-done} SECTION(S) REMAINING</span>`:''}
      </div>
    </div>

    <div class="glitch-bar">
      <span>COMPROG // RIZZ_MODULE_v3 🔥</span>
      <span style="color:var(--color-primary)">SECTIONS: ${done}/${SECTIONS.length}</span>
      <span style="color:var(--color-secondary)">MASTERY: ${mastery!==null?mastery+'%':'--'}</span>
      <span class="animate-blink">█</span>
    </div>
  `);
}

// ── SECTION ENTRY ─────────────────────────────────────────────────────────────
function startSection(i){
  secIdx=i;termIdx=0;termAnswered=false;
  const s=SECTIONS[i];
  if(sp(s.id).status==='not-started'){prog[s.id]={...sp(s.id),status:'in-progress'};saveP()}
  renderTerm();
}

// ── TERM CONCEPT ──────────────────────────────────────────────────────────────
function renderTerm(){
  const s=SECTIONS[secIdx];
  const term=s.terms[termIdx];
  const totalTerms=s.terms.length;
  const step=termIdx*2;
  const totalSteps=totalTerms*2;
  R(`
    <div style="background:var(--color-black);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--color-primary)">
      <button class="btn btn-ghost btn-sm" onclick="renderHome()" style="border-color:#333;color:#fff;padding:6px 12px;font-size:0.7rem">← HOME</button>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--color-secondary);letter-spacing:2px">${s.emoji} ${s.title.toUpperCase()}</div>
        ${progressBar(step,totalSteps,'progress-bar-secondary')}
      </div>
      <span class="badge badge-secondary" style="white-space:nowrap">${termIdx+1}/${totalTerms}</span>
    </div>

    <div style="padding:16px 16px 80px">
      <div class="hazard-stripe-sm" style="height:10px;margin-bottom:16px"></div>

      <div class="card card-flat z-slide" style="animation:none;margin-bottom:16px">
        <div class="card-header" style="background:var(--color-primary);color:#0a0a0a;gap:10px">
          <div>
            <span style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:2px;opacity:0.6">// TERM ${termIdx+1} OF ${totalTerms}</span>
            <div class="card-name" style="color:#0a0a0a;font-size:clamp(1.2rem,4vw,1.8rem)">${esc(term.name)}</div>
          </div>
          <span class="badge badge-black" style="font-size:0.6rem;align-self:flex-start;white-space:nowrap">📖 CONCEPT</span>
        </div>
        <div class="card-body concept-body">${term.body}</div>
        <div class="card-footer">
          <span class="serial-no">${s.cat} // ${s.id.toUpperCase()}</span>
          <span style="font-family:var(--font-mono);font-size:0.65rem;color:#999">STEP ${step+1} OF ${totalSteps}</span>
        </div>
      </div>

      <button class="btn btn-primary btn-block btn-lg" onclick="startTermQ()">
        QUIZ ME ON THIS →
      </button>
    </div>

    <div class="glitch-bar">
      <span>${s.emoji} ${s.title.toUpperCase()}</span>
      <span style="color:var(--color-primary)">TERM: ${termIdx+1}/${totalTerms}</span>
      <span class="animate-blink" style="color:var(--color-secondary)">█</span>
    </div>
  `);
}

// ── TERM MINI-QUIZ ────────────────────────────────────────────────────────────
function startTermQ(){termAnswered=false;renderTermQ()}

function renderTermQ(){
  const s=SECTIONS[secIdx];
  const term=s.terms[termIdx];
  const q=term.q;
  const totalTerms=s.terms.length;
  const step=termIdx*2+1;
  const totalSteps=totalTerms*2;
  const types={mc:'MULTIPLE CHOICE',id:'IDENTIFICATION',fib:'FILL IN THE BLANK'};
  const tclr={mc:'badge-primary',id:'badge-secondary',fib:'badge-success'};
  let qBody='';
  if(q.type==='mc'){
    qBody=q.choices.map(c=>`<button class="choice-btn" data-l="${c[0]}" onclick="handleTermMC('${c[0]}')">${esc(c)}</button>`).join('');
  } else if(q.type==='id'){
    qBody=`<div class="form-group" style="margin-top:12px">
      <label class="form-label" for="idinp">// Your Answer</label>
      <input id="idinp" type="text" class="form-control id-input" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')submitTermID()">
    </div>
    <button class="btn btn-primary btn-block" onclick="submitTermID()" style="margin-top:8px">SUBMIT ANSWER</button>`;
  } else if(q.type==='fib'){
    let code=q.code;
    q.blanks.forEach(b=>{
      const w=Math.max(80,b.answer.length*10+28);
      code=code.replace(`___${b.id}___`,`<input class="fib-inp" id="fib${b.id}" placeholder="?" style="width:${w}px" onkeydown="if(event.key==='Enter')submitTermFIB()">`);
    });
    qBody=`<div class="fib-wrap">${code.split('\n').join('<br>')}</div>
    <button class="btn btn-secondary btn-block" onclick="submitTermFIB()" style="margin-top:8px">CHECK BLANKS</button>`;
  }

  R(`
    <div style="background:var(--color-black);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--color-warning)">
      <button class="btn btn-ghost btn-sm" onclick="renderTerm()" style="border-color:#333;color:#fff;padding:6px 12px;font-size:0.7rem">← REVIEW</button>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--color-warning);letter-spacing:2px">${s.emoji} ${esc(term.name).toUpperCase()}</div>
        ${progressBar(step,totalSteps,'progress-bar-warning')}
      </div>
      <span class="badge badge-warning" style="white-space:nowrap;color:#0a0a0a">❓ CHECK</span>
    </div>

    <div style="padding:16px 16px 80px">
      <div class="card card-flat z-slide" style="animation:none;margin-bottom:16px">
        <div class="card-header" style="background:#0a0a0a">
          <div>
            <span class="badge ${tclr[q.type]}" style="font-size:0.6rem;margin-bottom:6px">${types[q.type]}</span>
            <div style="font-family:var(--font-body);font-size:1rem;font-weight:700;text-transform:none;line-height:1.45;color:#fff;margin-top:6px;max-width:560px">${esc(q.q)}</div>
          </div>
        </div>
        <div class="card-body" style="padding:20px">
          ${qBody}
        </div>
      </div>
      <div id="fb"></div>
      <div id="act" style="margin-top:12px"></div>
    </div>

    <div class="glitch-bar">
      <span>${s.emoji} ${esc(term.name).toUpperCase()}</span>
      <span style="color:var(--color-warning)">STEP ${step} OF ${totalSteps}</span>
      <span class="animate-blink">█</span>
    </div>
  `);
  termAnswered=false;
}

function handleTermMC(l){
  if(termAnswered)return;termAnswered=true;
  const q=SECTIONS[secIdx].terms[termIdx].q;
  const ok=l===q.answer;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.l===q.answer)b.classList.add('correct');
    else if(b.dataset.l===l&&!ok)b.classList.add('wrong');
  });
  showTermFB(ok,q.exp);
}

function submitTermID(){
  if(termAnswered)return;
  const inp=document.getElementById('idinp');
  if(!inp||!inp.value.trim())return;
  termAnswered=true;
  const q=SECTIONS[secIdx].terms[termIdx].q;
  const ok=q.accept.some(a=>a.toLowerCase()===inp.value.trim().toLowerCase());
  inp.disabled=true;
  inp.style.borderColor=ok?'var(--color-success)':'var(--color-danger)';
  inp.style.background=ok?'#e6fff3':'#ffe5e5';
  showTermFB(ok,q.exp,ok?null:`Expected: <strong>${esc(q.answer)}</strong>`);
}

function submitTermFIB(){
  if(termAnswered)return;termAnswered=true;
  const q=SECTIONS[secIdx].terms[termIdx].q;
  let allOk=true;const wrongBlanks=[];
  q.blanks.forEach(b=>{
    const inp=document.getElementById('fib'+b.id);if(!inp)return;
    const ok=b.accept.some(a=>a.toLowerCase()===inp.value.trim().toLowerCase());
    inp.classList.add(ok?'ok':'bad');inp.disabled=true;
    if(!ok){allOk=false;wrongBlanks.push(b);}
  });
  showTermFB(allOk,q.exp,wrongBlanks.length?wrongBlanks.map(b=>`Blank ${b.id}: <code style="background:#f0f0f0;padding:1px 4px;border:1px solid #ddd;color:#6C47FF">${b.answer}</code>`).join(' | '):null);
}

function showTermFB(ok,exp,extra){
  const isLast=termIdx+1>=SECTIONS[secIdx].terms.length;
  document.getElementById('fb').innerHTML=`
    <div class="alert ${ok?'alert-success':'alert-danger'}" style="margin-top:12px">
      <span class="alert-icon">${ok?'✅':'❌'}</span>
      <div>
        <span class="alert-title">${ok?'Correct!':'Not quite.'}</span>
        ${extra?`<div style="margin:4px 0;font-size:0.875rem">${extra}</div>`:''}
        ${exp?`<div style="font-size:0.85rem;opacity:0.85">${esc(exp)}</div>`:''}
      </div>
    </div>`;
  document.getElementById('act').innerHTML=`
    <button class="btn btn-primary btn-block btn-lg" onclick="${isLast?'startConceptQuiz()':'nextTerm()'}">
      ${isLast?'📝 TAKE CONCEPT QUIZ →':'NEXT TERM →'}
    </button>
    ${!ok?`<button class="btn btn-ghost btn-block" onclick="renderTerm()" style="margin-top:8px">↩ REVIEW CONCEPT</button>`:''}
  `;
}

function nextTerm(){termIdx++;termAnswered=false;renderTerm()}

// ── CONCEPT QUIZ ──────────────────────────────────────────────────────────────
function startConceptQuiz(){
  quizQs=shuffle([...SECTIONS[secIdx].quiz]);
  quizIdx=0;quizCorrect=0;quizAnswered=false;quizWrong=[];
  renderCQ();
}

function renderCQ(){
  const s=SECTIONS[secIdx];
  if(quizIdx>=quizQs.length&&quizWrong.length===0){endCQ();return}
  if(quizIdx>=quizQs.length){quizQs=[...quizWrong];quizWrong=[];quizIdx=0;}
  const q=quizQs[quizIdx];
  const origTotal=s.quiz.length;
  R(`
    <div style="background:var(--color-black);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--color-secondary)">
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--color-secondary);letter-spacing:2px">${s.emoji} CONCEPT QUIZ</div>
        ${progressBar(quizIdx,quizQs.length,'progress-bar-secondary')}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <span class="badge badge-secondary" style="color:#0a0a0a;font-size:0.6rem">Q${quizIdx+1}/${quizQs.length}</span>
        <span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--color-success)">${quizCorrect} ✓</span>
      </div>
    </div>

    <div style="padding:16px 16px 80px">
      <div class="card card-flat z-slide" style="animation:none;margin-bottom:16px">
        <div class="card-header" style="background:#0a0a0a">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <span class="badge badge-secondary" style="color:#0a0a0a;font-size:0.6rem">📝 SECTION QUIZ</span>
              ${quizWrong.length>0?`<span class="badge badge-warning" style="color:#0a0a0a;font-size:0.6rem">↩ ${quizWrong.length} TO RETRY</span>`:''}
            </div>
            <div style="font-family:var(--font-body);font-size:1rem;font-weight:700;text-transform:none;line-height:1.45;color:#fff;max-width:560px">${esc(q.q)}</div>
          </div>
        </div>
        <div class="card-body" style="padding:20px">
          ${q.choices.map(c=>`<button class="choice-btn" data-l="${c[0]}" onclick="handleCQ('${c[0]}')">${esc(c)}</button>`).join('')}
        </div>
      </div>
      <div id="fb"></div><div id="act" style="margin-top:12px"></div>
    </div>

    <div class="glitch-bar">
      <span>${s.emoji} ${s.title.toUpperCase()} QUIZ</span>
      <span style="color:var(--color-success)">${quizCorrect}/${origTotal} CORRECT</span>
      <span class="animate-blink" style="color:var(--color-secondary)">█</span>
    </div>
  `);quizAnswered=false;
}

function handleCQ(l){
  if(quizAnswered)return;quizAnswered=true;
  const q=quizQs[quizIdx];
  const ok=l===q.answer;
  if(ok)quizCorrect++;else quizWrong.push(q);
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.l===q.answer)b.classList.add('correct');
    else if(b.dataset.l===l&&!ok)b.classList.add('wrong');
  });
  document.getElementById('fb').innerHTML=`
    <div class="alert ${ok?'alert-success':'alert-danger'}" style="margin-top:12px">
      <span class="alert-icon">${ok?'✅':'❌'}</span>
      <span class="alert-title">${ok?'Correct!':'Incorrect — will re-ask later.'}</span>
    </div>`;
  const isLast=quizIdx+1>=quizQs.length;
  document.getElementById('act').innerHTML=`<button class="btn btn-primary btn-block btn-lg" onclick="nextCQ()">${isLast&&quizWrong.length===0?'SEE RESULTS 🏁':'NEXT →'}</button>`;
}

function nextCQ(){quizIdx++;quizAnswered=false;renderCQ()}

function endCQ(){
  const s=SECTIONS[secIdx];
  const total=s.quiz.length;
  const p=Math.round(quizCorrect/total*100);
  prog[s.id]={status:'completed',quizScore:{correct:quizCorrect,total}};saveP();
  const grade=p>=80?'good':p>=60?'ok':'bad';
  const gradeColor=p>=80?'var(--color-success)':p>=60?'var(--color-warning)':'var(--color-danger)';
  const msg=p>=80?'OUTSTANDING! 🔥':p>=60?'GOOD EFFORT — REVIEW & RETRY!':'NEEDS WORK — REVIEW THE CONCEPTS.';
  const nextI=secIdx+1,hasNext=nextI<SECTIONS.length;
  R(`
    <div style="background:var(--color-black);padding:12px 16px;border-bottom:3px solid ${gradeColor}">
      <div style="font-family:var(--font-mono);font-size:0.65rem;color:${gradeColor};letter-spacing:2px">${s.emoji} SECTION COMPLETE</div>
    </div>
    <div style="padding:24px 16px 80px;text-align:center">
      <div class="hazard-stripe-sm" style="height:10px;margin-bottom:24px"></div>
      <div class="score-ring ${grade}" style="margin-bottom:20px">
        <div style="font-size:2.4rem;font-weight:900;line-height:1">${p}%</div>
        <div style="font-family:var(--font-mono);font-size:0.65rem">${quizCorrect}/${total}</div>
      </div>
      <h2 style="font-family:var(--font-display);font-size:1.8rem;font-weight:900;text-transform:uppercase;color:${gradeColor};margin-bottom:8px">${msg}</h2>
      <p style="color:var(--color-text-muted);font-family:var(--font-mono);font-size:0.75rem;margin-bottom:28px">${s.title.toUpperCase()} · SECTION MARKED COMPLETE</p>
      <div style="display:flex;flex-direction:column;gap:12px;max-width:360px;margin:0 auto">
        ${hasNext?`<button class="btn btn-primary btn-block btn-lg" onclick="startSection(${nextI})">${SECTIONS[nextI].emoji} NEXT: ${SECTIONS[nextI].title.toUpperCase()} →</button>`:''}
        ${!hasNext?`<button class="btn btn-primary btn-block btn-xl" onclick="startMastery()">🏆 MASTERY QUIZ</button>`:''}
        <button class="btn btn-ghost btn-block" onclick="startSection(${secIdx})">↩ RETRY SECTION</button>
        <button class="btn btn-black btn-block" onclick="renderHome()">🏠 HOME</button>
      </div>
    </div>
    <div class="glitch-bar">
      <span>${s.emoji} ${s.title.toUpperCase()}</span>
      <span style="color:${gradeColor}">${p}% · ${quizCorrect}/${total} CORRECT</span>
      <span class="animate-blink">█</span>
    </div>
  `);
}

// ── MASTERY QUIZ ──────────────────────────────────────────────────────────────
function startMastery(){
  mqQs=shuffle([...MASTERY]);mqIdx=0;mqCorrect=0;mqAnswered=false;
  renderMQ();
}

function renderMQ(){
  if(mqIdx>=mqQs.length){endMQ();return}
  const q=mqQs[mqIdx];
  R(`
    <div style="background:var(--color-black);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--color-primary)">
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--color-primary);letter-spacing:2px">🏆 MASTERY QUIZ</div>
        ${progressBar(mqIdx,mqQs.length,'progress-bar-striped progress-bar-animated')}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <span class="badge badge-primary" style="font-size:0.6rem;color:#0a0a0a">Q${mqIdx+1}/${mqQs.length}</span>
        <span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--color-success)">${mqCorrect} ✓</span>
      </div>
    </div>

    <div style="padding:16px 16px 80px">
      <div class="card card-flat z-slide" style="animation:none;margin-bottom:16px">
        <div class="card-header" style="background:#0a0a0a">
          <div style="flex:1">
            <span class="badge badge-primary" style="font-size:0.6rem;color:#0a0a0a;margin-bottom:8px">🏆 MASTERY</span>
            <div style="font-family:var(--font-body);font-size:1rem;font-weight:700;text-transform:none;line-height:1.45;color:#fff;max-width:560px;margin-top:6px">${esc(q.q)}</div>
          </div>
        </div>
        <div class="card-body" style="padding:20px">
          ${q.choices.map(c=>`<button class="choice-btn" data-l="${c[0]}" onclick="handleMQ('${c[0]}')">${esc(c)}</button>`).join('')}
        </div>
      </div>
      <div id="fb"></div><div id="act" style="margin-top:12px"></div>
    </div>

    <div class="glitch-bar">
      <span>🏆 MASTERY QUIZ</span>
      <span style="color:var(--color-primary)">${mqIdx+1}/${mqQs.length}</span>
      <span style="color:var(--color-success)">${mqCorrect} CORRECT</span>
      <span class="animate-blink">█</span>
    </div>
  `);mqAnswered=false;
}

function handleMQ(l){
  if(mqAnswered)return;mqAnswered=true;
  const q=mqQs[mqIdx];
  const ok=l===q.answer;
  if(ok)mqCorrect++;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.l===q.answer)b.classList.add('correct');
    else if(b.dataset.l===l&&!ok)b.classList.add('wrong');
  });
  document.getElementById('fb').innerHTML=`
    <div class="alert ${ok?'alert-success':'alert-danger'}" style="margin-top:12px">
      <span class="alert-icon">${ok?'✅':'❌'}</span>
      <span class="alert-title">${ok?'Correct!':'Incorrect — correct answer highlighted above.'}</span>
    </div>`;
  document.getElementById('act').innerHTML=`<button class="btn btn-primary btn-block btn-lg" onclick="nextMQ()">${mqIdx+1>=mqQs.length?'SEE RESULTS 🏁':'NEXT →'}</button>`;
}

function nextMQ(){mqIdx++;mqAnswered=false;renderMQ()}

function endMQ(){
  const p=Math.round(mqCorrect/mqQs.length*100);
  prog._mastery=p;saveP();
  const grade=p>=80?'good':p>=60?'ok':'bad';
  const gradeColor=p>=80?'var(--color-success)':p>=60?'var(--color-warning)':'var(--color-danger)';
  const msg=p>=80?'FULL MASTERY! YOU SLAY! 🔥':p>=60?'ALMOST THERE — REVIEW WEAK SECTIONS!':'KEEP GRINDING — REVIEW AND RETRY!';
  R(`
    <div style="background:var(--color-black);padding:12px 16px;border-bottom:3px solid ${gradeColor}">
      <div style="font-family:var(--font-mono);font-size:0.65rem;color:${gradeColor};letter-spacing:2px">🏆 MASTERY COMPLETE</div>
    </div>
    <div style="padding:24px 16px 80px;text-align:center">
      <div class="hazard-stripe" style="height:20px;margin-bottom:28px"></div>
      <div style="font-size:3rem;margin-bottom:8px">🏆</div>
      <h2 style="font-family:var(--font-display);font-size:clamp(2rem,8vw,3.5rem);font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-2px;color:${gradeColor};margin-bottom:4px">MASTERY<br>COMPLETE</h2>
      <div class="score-ring ${grade}" style="margin:20px auto">
        <div style="font-size:2.4rem;font-weight:900;line-height:1">${p}%</div>
        <div style="font-family:var(--font-mono);font-size:0.65rem">${mqCorrect}/${mqQs.length}</div>
      </div>
      <p style="font-family:var(--font-display);font-size:1.3rem;font-weight:900;text-transform:uppercase;color:${gradeColor};margin-bottom:8px">${msg}</p>
      <p style="color:var(--color-text-muted);font-family:var(--font-mono);font-size:0.7rem;margin-bottom:28px">COMPROG // all the syntax is still valid tho. we do NOT cap on the code.</p>
      <div style="display:flex;flex-direction:column;gap:12px;max-width:360px;margin:0 auto">
        <button class="btn btn-primary btn-block btn-xl" onclick="startMastery()">↩ RETAKE MASTERY QUIZ</button>
        <button class="btn btn-black btn-block btn-lg" onclick="renderHome()">🏠 BACK TO HOME</button>
      </div>
    </div>
    <div class="glitch-bar">
      <span>🏆 MASTERY QUIZ</span>
      <span style="color:${gradeColor}">${p}% · ${mqCorrect}/${mqQs.length}</span>
      <span class="animate-blink">█</span>
    </div>
  `);
}

renderHome();

</script>
</body>
</html>
